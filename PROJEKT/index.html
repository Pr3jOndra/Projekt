<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>AI IT Asistent</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 500px;
            background: #111827;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
        }

        textarea {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        .response {
            margin-top: 20px;
            background: #1f2937;
            padding: 15px;
            border-radius: 10px;
            min-height: 60px;
            white-space: pre-wrap;
        }

        .label {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>AI IT Asistent</h1>

    <div class="label">Napiš problém nebo otázku:</div>
    <textarea id="problem" placeholder="např. Nejde mi internet v PC..."></textarea>

    <button onclick="send()">Odeslat</button>

    <div class="response" id="response">Odpověď se zobrazí zde...</div>
</div>

<script>
async function send() {
    const problem = document.getElementById("problem").value;
    const out = document.getElementById("response");

    out.innerText = "AI přemýšlí...";

    try {
        const res = await fetch("/ai", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({problem})
        });

        const data = await res.json();
        out.innerText = data.answer;

    } catch (e) {
        out.innerText = "Chyba spojení s API";
    }
}
</script>

</body>
</html>
